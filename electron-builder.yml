appId: com.koala-clash
productName: Koala Clash
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!extra/*'
  - '!tailwind.config.js'
  - '!postcss.config.js'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: './extra/'
    to: ''
protocols:
  name: 'Koala Clash URI Scheme'
  schemes:
    - 'clash'
    - 'mihomo'
    - 'koala-clash'
mac:
  target:
    - dmg
    - zip
  minimumSystemVersion: '10.13.0'
  artifactName: ${productName}_${arch}.${ext}
dmg:
  artifactName: ${productName}_${arch}.${ext}
publish: []
